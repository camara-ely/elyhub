<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ElyHub — Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Cormorant+SC:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100%; }
  /* Smooth scroll for anchor jumps and programmatic scrollIntoView. Mouse
     wheel + trackpad are interpolated via JS in app.jsx for a momentum feel. */
  html { scroll-behavior: auto; }
  body {
    background: #05060A;
    color: #fff;
    font-family: "Inter Tight", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    overscroll-behavior: none;
  }
  /* Soften the scroll on every overflow:auto region (sidebar + main pane in
     the Shell, modals, drawers). scroll-behavior is inherited but we set it
     explicitly on common scrollable selectors to be safe. */
  main, aside, [class*="scroll"], .no-scrollbar {
    scroll-behavior: auto;
  }
  input::placeholder { color: rgba(255,255,255,0.38); }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* `.no-scrollbar` — keep an element scrollable but invisibly so. Used by
     the Shell's sidebar + main panes so users get independent scroll regions
     without two visible scrollbars chopping up the chrome. Works in WebKit
     (macOS Tauri webview), Chromium (Windows WebView2), and Firefox. */
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; width: 0; height: 0; }

  /* Accessibility — visible keyboard focus.
     We suppress the default browser outline only for pointer-driven focus
     (via :focus:not(:focus-visible)) and keep a crisp ring for keyboard
     navigation. The ring is offset so it reads clearly over glass panels. */
  :focus { outline: none; }
  :focus-visible {
    outline: 2px solid rgba(61,123,255,0.9);
    outline-offset: 2px;
    border-radius: 6px;
  }
  /* Screen-reader-only utility for skip links and visually-hidden labels. */
  .sr-only {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }
  .skip-link {
    position: absolute; top: -40px; left: 12px;
    padding: 8px 14px; border-radius: 8px;
    background: #3d7bff; color: #fff;
    font-weight: 600; font-size: 13px;
    text-decoration: none; z-index: 100000;
    transition: top .15s ease;
  }
  .skip-link:focus { top: 12px; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.96) } to { opacity: 1; transform: translateY(0) scale(1) } }
  @keyframes slideInR { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
  @keyframes cardRise { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes btnSpin { to { transform: rotate(360deg) } }
  @keyframes orb1 {
    0%, 100% { transform: translate(0, 0) scale(1) }
    33% { transform: translate(8vw, 10vh) scale(1.1) }
    66% { transform: translate(-4vw, 6vh) scale(0.95) }
  }
  @keyframes orb2 {
    0%, 100% { transform: translate(0, 0) scale(1) }
    50% { transform: translate(-10vw, -8vh) scale(1.08) }
  }
  @keyframes orb3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1) }
    50% { transform: translate(-40%, -60%) scale(1.15) }
  }
  @keyframes focusPulse {
    0%   { box-shadow: 0 0 0 0 rgba(61,123,255,0.55), inset 0 1px 0 rgba(255,255,255,0.14), 0 10px 40px rgba(0,0,0,0.35); }
    50%  { box-shadow: 0 0 0 8px rgba(61,123,255,0.00), 0 0 32px rgba(61,123,255,0.55), inset 0 1px 0 rgba(255,255,255,0.2), 0 10px 40px rgba(0,0,0,0.35); }
    100% { box-shadow: 0 0 0 0 rgba(61,123,255,0.00), inset 0 1px 0 rgba(255,255,255,0.14), 0 10px 40px rgba(0,0,0,0.35); }
  }
  .focus-pulse {
    animation: focusPulse 2.2s ease-out;
    border-color: rgba(61,123,255,0.6) !important;
  }

  /* Responsive */
  @media (max-width: 960px) {
    .ely-home-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) {
    aside { display: none !important; }
    main > div { padding: 20px !important; }
    h1 { font-size: 36px !important; }
  }
</style>
<script>
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "blue"
  }/*EDITMODE-END*/;

  // Tauri's WKWebView on tauri:// URLs doesn't auto-reload on ⌘R like a
  // browser does, and the app has no native menu bar. Intercept here so
  // ⌘R (and Ctrl+R on Linux/Win) reload the page during dev.
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'r' || e.key === 'R')) {
      e.preventDefault();
      location.reload();
    }
  });

  // ──── Scroll tail (instant + post-input glide) ────
  // Each wheel event applies its full delta to scrollTop IMMEDIATELY (1:1
  // native feel — no input lag). It also captures the delta as velocity.
  // The rAF loop continues that velocity AFTER the user stops scrolling,
  // decaying it via FRICTION for a soft tail. Within the same frame as a
  // wheel event the tail is skipped (no double-apply).
  // Disable: localStorage.setItem('ely:no-smooth','1')
  (function scrollInertia() {
    if (typeof window === 'undefined') return;
    try { if (localStorage.getItem('ely:no-smooth') === '1') return; } catch {}
    const findScroller = (start) => {
      let el = start;
      while (el && el !== document.body) {
        const oy = getComputedStyle(el).overflowY;
        if ((oy === 'auto' || oy === 'scroll') && el.scrollHeight > el.clientHeight + 1) return el;
        el = el.parentElement;
      }
      return null;
    };
    const FRICTION    = 0.90;  // per-frame v multiplier (tail length)
    const TAIL_WEIGHT = 0.45;  // capture (last delta * this) → tail velocity
    const STOP        = 0.4;
    const state = new WeakMap();
    const tick = (el) => {
      const s = state.get(el);
      if (!s) return;
      // Wheel fired in the last ~16ms → user is still actively scrolling.
      // Instant apply already happened; don't double via tail.
      if (performance.now() - s.lastWheel < 18) {
        s.raf = requestAnimationFrame(() => tick(el));
        return;
      }
      if (Math.abs(s.v) < STOP) { s.v = 0; s.raf = 0; return; }
      el.scrollTop += s.v;
      s.v *= FRICTION;
      s.raf = requestAnimationFrame(() => tick(el));
    };
    window.addEventListener('wheel', (e) => {
      if (e.ctrlKey || e.metaKey) return;
      const el = findScroller(e.target);
      if (!el) return;
      e.preventDefault();
      const pxPerUnit = e.deltaMode === 1 ? 40 : (e.deltaMode === 2 ? el.clientHeight : 1);
      const dy = e.deltaY * pxPerUnit;
      // Apply delta INSTANTLY — full strength, native feel.
      el.scrollTop += dy;
      let s = state.get(el);
      if (!s) { s = { v: 0, lastWheel: 0, raf: 0 }; state.set(el, s); }
      s.v = dy * TAIL_WEIGHT;
      s.lastWheel = performance.now();
      if (!s.raf) s.raf = requestAnimationFrame(() => tick(el));
    }, { passive: false });
  })();
</script>
<!-- React is vendored locally so dev works offline (and without unpkg as a
     runtime dependency). Babel-standalone stays on CDN in dev only — it's
     2.7MB and the prod build drops it entirely (transpiled ahead of time
     by build.mjs). See build.mjs for the dev→prod rewrite. -->
<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
