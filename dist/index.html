<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ElyHub — Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100%; }
  body {
    background: #05060A;
    color: #fff;
    font-family: "Inter Tight", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  input::placeholder { color: rgba(255,255,255,0.38); }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.96) } to { opacity: 1; transform: translateY(0) scale(1) } }
  @keyframes slideInR { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
  @keyframes orb1 {
    0%, 100% { transform: translate(0, 0) scale(1) }
    33% { transform: translate(8vw, 10vh) scale(1.1) }
    66% { transform: translate(-4vw, 6vh) scale(0.95) }
  }
  @keyframes orb2 {
    0%, 100% { transform: translate(0, 0) scale(1) }
    50% { transform: translate(-10vw, -8vh) scale(1.08) }
  }
  @keyframes orb3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1) }
    50% { transform: translate(-40%, -60%) scale(1.15) }
  }

  /* Responsive */
  @media (max-width: 960px) {
    .ely-home-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 720px) {
    aside { display: none !important; }
    main > div { padding: 20px !important; }
    h1 { font-size: 36px !important; }
  }
</style>
<script>
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "blue"
  }/*EDITMODE-END*/;
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>

</html>
